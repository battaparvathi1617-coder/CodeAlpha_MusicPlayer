<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="main-heading">Music Player</h1>

    <!-- Music Player Card -->
    <div class="player-container">
        <!-- Song Image -->
        <div class="img-container">
            <img src="https://picsum.photos/id/1025/300/300" alt="Album Art" id="cover">
        </div>

        <!-- Song Details -->
        <h2 id="title">Acoustic Vibe</h2>
        <h3 id="artist">Artist One</h3>

        <!-- Audio Element -->
        <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

        <!-- Progress Bar -->
        <div class="progress-container" id="progress-container">
            <div class="progress" id="progress"></div>
        </div>

        <!-- Player Controls -->
        <div class="controls">
            <button id="prev" class="action-btn" title="Previous">⏮</button>
            <button id="play" class="action-btn action-btn-big" title="Play/Pause">▶</button>
            <button id="next" class="action-btn" title="Next">⏭</button>
        </div>

        <!-- Volume Control -->
        <div class="volume-container">
            <label for="volume">🔊</label>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
        </div>
    </div>

    <!-- Details Section -->
    <div class="details-container">
        <h3>Details</h3>
        <ul>
            <li>Audio Controls: Play, Pause, Next, and Previous track functionality.</li>
            <li>Shows Song Title, Artist name, and dynamic progress bar.</li>
            <li>Includes custom Volume Control slider[cite: 1].</li>
            <li>Fully responsive and styled user interface[cite: 1].</li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
